<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Standalone @gravity-ui/graph Web Component Example</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
        }
        
        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }
        
        .header {
            margin-bottom: 20px;
        }
        
        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        button {
            padding: 8px 16px;
            background-color: #0077cc;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        
        button:hover {
            background-color: #005fa3;
        }
        
        .graph-container {
            flex: 1;
            border: 1px solid #ddd;
            border-radius: 4px;
            background-color: #fff;
            overflow: hidden;
        }
        
        /* Custom styles for the web component */
        graph-editor {
            display: block;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Standalone @gravity-ui/graph Web Component Example</h1>
            <p>This example demonstrates how to use the bundled web component directly in HTML without any build process.</p>
        </div>
        
        <div class="controls">
            <button id="add-block">Add Block</button>
            <button id="center-view">Center View</button>
            <button id="toggle-bezier">Toggle Bezier Connections</button>
        </div>
        
        <div class="graph-container">
            <!-- Our custom web component -->
            <graph-editor></graph-editor>
        </div>
    </div>

    <!-- Import the bundled web component script as a module -->
    <!-- In a real-world scenario, you would use a CDN or a local copy of the bundled file -->
    <script type="module" src="./dist/graph-editor.js"></script>
    
    <!-- Main application script -->
    <script type="module">
        // Wait for the custom element to be defined
        customElements.whenDefined('graph-editor').then(() => {
            const graphEditor = document.querySelector('graph-editor');
            const addBlockButton = document.getElementById('add-block');
            const centerViewButton = document.getElementById('center-view');
            const toggleBezierButton = document.getElementById('toggle-bezier');
            
            // Add a new block when the button is clicked
            addBlockButton.addEventListener('click', () => {
                graphEditor.addRandomBlock();
            });
            
            // Center the view when the button is clicked
            centerViewButton.addEventListener('click', () => {
                graphEditor.centerView();
            });
            
            // Toggle bezier connections when the button is clicked
            toggleBezierButton.addEventListener('click', () => {
                graphEditor.toggleBezierConnections();
            });
        });
    </script>
</body>
</html>
